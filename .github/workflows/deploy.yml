# ====================================================
# GitHub Actions Workflow: EC2 자동 배포
# 트리거: main 브랜치에 push될 때마다 자동 실행
# 흐름: 코드 push → 이미지 빌드 → ECR push → EC2 배포
# ====================================================

name: Deploy to EC2 # GitHub Actions 탭에 표시되는 workflow 이름

# -------------------------------------------------------
# on: 이 workflow를 언제 실행할지 정의 (trigger)
# push: 코드가 push될 때
# branches: [main]: main 브랜치에 push될 때만 실행
#           develop, feature 등 다른 브랜치는 무시
# -------------------------------------------------------
on:
  push:
    branches: [main]

jobs:
  # =============================================
  # Job 1: Docker 이미지 빌드 후 ECR에 업로드
  # job은 여러 step들의 묶음 단위
  # =============================================
  build-and-push:
    # runs-on: 이 job이 실행될 가상머신 환경 지정
    # ubuntu-latest: GitHub이 무료로 제공하는 Ubuntu 서버
    # 이 가상머신 안에서 아래 steps가 순서대로 실행됨
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------
      # step의 구성요소 설명
      # name: Actions 탭에서 표시되는 step 이름 (자유롭게 작성)
      # uses: 남이 만들어놓은 action(플러그인)을 가져다 쓸 때 사용
      # with: uses로 가져온 action에 전달할 설정값 (action마다 다름)
      # run:  직접 터미널 명령어를 실행할 때 사용 (uses와 run은 동시에 못 씀)
      # id:   이 step의 고유 ID. 아래 step에서 이 step의 결과값을 참조할 때 사용
      #       예: steps.login-ecr.outputs.registry
      # --------------------------------------------------

      # ① 가상머신에 내 GitHub 레포지토리 코드를 다운로드
      #    uses로 GitHub 공식 checkout action 사용
      #    이게 없으면 Dockerfile을 찾지 못해 빌드 자체가 불가능
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      # ② 가상머신에서 AWS 명령어를 쓸 수 있도록 인증 설정
      #    uses로 AWS 공식 자격증명 action 사용
      #    with으로 Secrets에 저장한 키값들을 action에 전달
      #    이 설정이 없으면 ECR 로그인, 이미지 push 전부 권한 오류 발생
      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }} # IAM 사용자 액세스 키
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} # IAM 사용자 시크릿 키
          aws-region: ap-northeast-2 # 서울 리전 (ECR 생성 리전과 반드시 일치)

      # ③ ECR에 이미지를 push하려면 Docker가 ECR을 인식할 수 있도록 로그인 필요
      #    위에서 AWS 자격증명이 이미 설정되어 있어서 별도 ID/PW 없이 자동 로그인됨
      #    id: login-ecr → 이 step의 결과값(ECR 주소)을 아래에서
      #    ${{ steps.login-ecr.outputs.registry }} 로 참조하기 위해 id 지정
      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ④ 실제 Docker 이미지 빌드 후 ECR에 push
      #    run: | 처럼 | 를 붙이면 명령어를 여러 줄 작성 가능
      - name: Docker 이미지 빌드 & ECR push
        run: |
          # steps.login-ecr.outputs.registry:
          #   ECR 로그인 action이 자동으로 반환하는 ECR 주소
          #   형태: 계정ID.dkr.ecr.리전.amazonaws.com
          #   AWS_ACCOUNT_ID Secret 없이도 ECR URI를 자동으로 가져올 수 있음
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          ECR_BACKEND=$ECR_REGISTRY/board-app-github-actions-backend
          ECR_FRONTEND=$ECR_REGISTRY/board-app-github-actions-frontend

          # backend 이미지 빌드 & ECR push
          docker build -t $ECR_BACKEND:${{ github.sha }} ./backend
          docker tag $ECR_BACKEND:${{ github.sha }} $ECR_BACKEND:latest
          docker push $ECR_BACKEND:${{ github.sha }}
          docker push $ECR_BACKEND:latest

          # frontend 이미지 빌드 & ECR push
          docker build -t $ECR_FRONTEND:${{ github.sha }} ./frontend
          docker tag $ECR_FRONTEND:${{ github.sha }} $ECR_FRONTEND:latest
          docker push $ECR_FRONTEND:${{ github.sha }}
          docker push $ECR_FRONTEND:latest

  # =============================================
  # Job 2: EC2에 배포
  # =============================================
  deploy:
    # needs: 지정한 job이 성공해야만 이 job 실행
    # build-and-push가 실패하면 이 job은 실행되지 않음
    # 즉 빌드 실패한 코드가 서버에 배포되는 사고를 방지
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      # ⑤ SSH로 EC2에 접속해서 배포 명령어 실행
      #    uses: appleboy/ssh-action → SSH 접속을 쉽게 처리해주는 외부 action
      #    with으로 SSH 접속 정보와 실행할 명령어(script)를 전달
      - name: EC2에 SSH 접속하여 배포
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }} # EC2 탄력적 IP
          username: ${{ secrets.EC2_USERNAME }} # ubuntu
          key: ${{ secrets.EC2_KEY }} # .pem 파일 내용

          # script: SSH로 접속한 EC2 서버 안에서 실행할 명령어들
          # 여기서부터는 GitHub 가상머신이 아닌 실제 EC2 서버에서 실행됨
          # deploy job은 build-and-push job과 별도 가상머신에서 실행되므로
          # steps.login-ecr.outputs.registry 참조 불가 → AWS_ACCOUNT_ID Secret 사용
          script: |
            cd ~/board-app-github-actions
            docker compose pull
            docker compose up -d
            docker image prune -f

      # ⑥ if: 조건이 맞을 때만 이 step을 실행
      #    success(): 이 job의 이전 step들이 전부 성공했을 때
      #    Actions 탭 로그에서 확인 가능
      - name: 배포 성공 알림
        if: success()
        run: |
          echo "배포 성공! 커밋: ${{ github.sha }}"

      # ⑦ failure(): 이 job의 step 중 하나라도 실패했을 때
      - name: 배포 실패 알림
        if: failure()
        run: |
          echo "배포 실패! GitHub Actions 로그를 확인하세요."
